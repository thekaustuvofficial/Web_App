name: CI/CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install dependencies
      run: npm install

    - name: Run tests
      run: npm test || echo "No tests found"

    - name: Build project
      run: npm run build || echo "No build step"

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - name: Deploy step
      run: echo "Deploy your app here"